name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_URL: /gamma-explorer-pro/
          VITE_SUPABASE_URL: https://ikvwejdepfvjuofcnbww.supabase.co
          VITE_SUPABASE_PROJECT_ID: ikvwejdepfvjuofcnbww
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlrdndlamRlcGZ2anVvZmNuYnd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTQ4OTEsImV4cCI6MjA5Mjc5MDg5MX0.JC55rSwUf8tG3VEjMAE-MCrxCpncGKIcf3La9oUS0JE

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
