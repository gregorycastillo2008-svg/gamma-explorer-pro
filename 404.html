<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect: store the intended path and redirect to index
      var base = '/gamma-explorer-pro';
      var path = window.location.pathname.slice(base.length) || '/';
      sessionStorage.setItem('spa-redirect', path + window.location.search + window.location.hash);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
