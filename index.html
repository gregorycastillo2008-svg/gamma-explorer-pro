    <script>
      // Restore path after GitHub Pages 404 redirect
      (function() {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          history.replaceState(null, null, '/gamma-explorer-pro' + redirect);
        }
      })();
    </script>
    
    <!-- PROTECCIÓN DE CÓDIGO FUENTE -->
    <script>
      // Deshabilitar DevTools (F12, Ctrl+Shift+I, Ctrl+Shift+C, Ctrl+I)
      document.addEventListener('keydown', function(e) {
        if (
          e.key === 'F12' ||
          (e.ctrlKey && e.shiftKey && e.key === 'I') ||
          (e.ctrlKey && e.shiftKey && e.key === 'C') ||
          (e.ctrlKey && e.key === 'I') ||
          (e.ctrlKey && e.shiftKey && e.key === 'J')
        ) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
      }, true);

      // Deshabilitar click derecho
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
      }, true);

      // Detectar si DevTools está abierto y redirigir
      let devToolsOpen = false;
      setInterval(function() {
        const threshold = 160;
        if (
          window.outerHeight - window.innerHeight > threshold ||
          window.outerWidth - window.innerWidth > threshold
        ) {
          if (!devToolsOpen) {
            devToolsOpen = true;
            console.clear();
            alert('⚠️ Las herramientas de desarrollo están deshabilitadas.\n\nAcceso no autorizado.');
            window.location.href = 'about:blank';
          }
        }
      }, 500);

      // Deshabilitar console
      window.console = {
        log: function() {},
        debug: function() {},
        info: function() {},
        warn: function() {},
        error: function() {},
        clear: function() {},
        assert: function() {},
        count: function() {}
      };

      // Proteger contra debugger statements
      Object.defineProperty(window, 'debugger', {
        value: undefined,
        writable: false,
        configurable: false
      });
    </script>

    #allgex-loader .spin {
